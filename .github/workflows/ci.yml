# ===========================================================================
# CI 流水线 — 每次 push / PR 自动执行
# ===========================================================================
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── 后端：Python 测试 ──────────────────────────────────
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: 运行测试
        env:
          # 测试环境不需要真实 OKX key，用占位值
          OKX_API_KEY: test
          OKX_SECRET_KEY: test
          OKX_PASSPHRASE: test
        run: python -m pytest tests/ -v --tb=short

  # ── 前端：ESLint + TypeScript 类型检查 ────────────────
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: 安装依赖
        run: npm ci

      - name: ESLint 检查
        run: npx eslint src --max-warnings 0

      - name: TypeScript 类型检查
        run: npx tsc -b
