[pytest]
# pytest-asyncio 配置
# mode=auto: 所有 async def 测试自动识别为 async 测试，无需逐个加 @pytest.mark.asyncio
# default_test_loop_scope=session: 所有 async 测试共享一个 session 级 event loop
#   原因: 真实 Redis/PostgreSQL 异步连接池是模块级全局单例，绑定到首个 loop。
#   默认 function 级 loop 每测试新建/关闭，跨测试复用旧连接会报 "Event loop is closed"。
#   session 级 loop 让连接池只绑定一次，集成测试可真实连 Redis/DB。
# default_fixture_loop_scope=session: async fixture 与测试共享同一 session loop
asyncio_mode = auto
asyncio_default_test_loop_scope = session
asyncio_default_fixture_loop_scope = session

# 测试发现
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 常用开关
addopts = -ra
filterwarnings =
    ignore::DeprecationWarning:pandas_ta.*
